<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Yokalma — La fidélité digitale{% endblock %}</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/tailwind.css' %}?v=2">

<!-- PWA Meta Tags & Manifest -->
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="{% static 'icons/favicon-32x32.png' %}">
<link rel="icon" type="image/png" sizes="192x192" href="{% static 'icons/icon-192x192.png' %}">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yokalma">
<link rel="apple-touch-icon" href="{% static 'icons/icon-192x192.png' %}">
<meta name="theme-color" content="#0B1F3A">

<!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/static/sw.js')
        .then((reg) => {
          reg.update();
          if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        })
        .catch(() => {});
    });
  }
</script>

{% block extra_head %}{% endblock %}
</head>
<body>

{% if messages %}
<div class="messages">
{% for msg in messages %}
  <div class="message message-{{ msg.tags }}">{{ msg }}</div>
{% endfor %}
</div>
<script>setTimeout(()=>document.querySelector('.messages')?.remove(),4000);</script>
{% endif %}

{% block body %}{% endblock %}
</body>
</html>
