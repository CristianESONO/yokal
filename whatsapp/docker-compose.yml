version: '3'
services:
  evolution_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: yokal
      POSTGRES_PASSWORD: yokal_password
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: always

  evolution_api:
    image: evoapicloud/evolution-api:latest
    ports:
      - "8095:8080"
    environment:
      - AUTHENTICATION_API_KEY=yokalma_token_123
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://yokal:yokal_password@evolution_db:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - CACHE_REDIS_ENABLED=false
    depends_on:
      - evolution_db
    restart: always
