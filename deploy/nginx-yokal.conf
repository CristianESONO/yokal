server {
    server_name yokalma.com www.yokalma.com yokalma.linkup.sn;
    client_max_body_size 50M;

    location /static/ {
        alias /usr/local/etc/yokal/staticfiles/;
        expires 30d;
    }

    location /media/ {
        alias /usr/local/etc/yokal/media/;
        autoindex off;
        access_log off;
        expires 30d;
        try_files $uri $uri/ =404;
    }

    location / {
        proxy_pass http://unix:/usr/local/etc/yokal/yokal.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/yokalma.linkup.sn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yokalma.linkup.sn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name yokalma.com www.yokalma.com yokalma.linkup.sn;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
